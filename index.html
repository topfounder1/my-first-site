<!DOCTYPE html>
<html>
<head>
  <title>Ultra Pro Game</title>

  <style>
    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      font-family: Arial;
      text-align: center;
    }

    .card {
      background: white;
      width: 320px;
      margin: 80px auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .win { background-color: #b2ffb2 !important; }
    .lose { background-color: #ffb2b2 !important; }

    button {
      background-color: #4facfe;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }
  </style>
</head>

<body>

  <div class="card" id="card">

    <h2>🎮 Ultra Game</h2>

    <p id="timer">⏱ Vaqt: 10</p>

    <input type="number" id="taxmin" placeholder="Son kiriting">
    <br><br>

    <button onclick="tekshir()">Tekshir</button>

    <p id="natija"></p>
    <p id="score"></p>

  </div>

  <script>
    var togriSon = Math.floor(Math.random() * 10) + 1;
    var score = 0;
    var vaqt = 10;
    var timer;

    // 🏆 leaderboard
    var bestScore = localStorage.getItem("bestScore") || 0;
    document.getElementById("score").innerHTML = "Score: 0 | Best: " + bestScore;

    function startTimer() {
      clearInterval(timer);
      vaqt = 10;
      document.getElementById("timer").innerHTML = "⏱ Vaqt: " + vaqt;

      timer = setInterval(function() {
        vaqt--;
        document.getElementById("timer").innerHTML = "⏱ Vaqt: " + vaqt;

        if (vaqt <= 0) {
          clearInterval(timer);
          document.getElementById("natija").innerHTML = "💀 Vaqt tugadi!";
          document.getElementById("card").classList.add("lose");
          playLose();
        }
      }, 1000);
    }

    function tekshir() {
      var userSon = document.getElementById("taxmin").value;
      var card = document.getElementById("card");

      card.classList.remove("win", "lose");

      if (userSon == togriSon) {
        score++;

        // 🏆 best score update
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem("bestScore", bestScore);
        }

        document.getElementById("natija").innerHTML = "🎉 To‘g‘ri!";
        document.getElementById("score").innerHTML = "Score: " + score + " | Best: " + bestScore;

        card.classList.add("win");
        playWin();

        togriSon = Math.floor(Math.random() * 10) + 1;
        startTimer();
      } else {
        document.getElementById("natija").innerHTML = "❌ Xato!";
        card.classList.add("lose");
        playLose();
      }
    }

    function playWin() {
      var audio = new Audio("https://www.soundjay.com/button/sounds/button-3.mp3");
      audio.play();
    }

    function playLose() {
      var audio = new Audio("https://www.soundjay.com/button/sounds/button-10.mp3");
      audio.play();
    }

    startTimer();
  </script>

</body>
</html>
