<!DOCTYPE html>
<html>
  <body style="background-color: lightblue; text-align: center;">

    <h1>🎮 Sonni top o‘yini</h1>
    <p>1 dan 10 gacha son o‘yladim, topa olasizmi? 😎</p>

    <input type="number" id="taxmin" placeholder="Son kiriting">
    <br><br>

    <button onclick="tekshir()">Tekshir 🔍</button>

    <p id="natija"></p>
    <p id="urinish"></p>

    <script>
      var togriSon = Math.floor(Math.random() * 10) + 1;
      var count = 0;

      function tekshir() {
        var userSon = document.getElementById("taxmin").value;
        count++;

        if (userSon == togriSon) {
          document.getElementById("natija").innerHTML = "🎉 To‘g‘ri topdingiz!";
          document.getElementById("urinish").innerHTML = "Urinishlar soni: " + count;

          // yangi o‘yin boshlash
          togriSon = Math.floor(Math.random() * 10) + 1;
          count = 0;
        } else {
          document.getElementById("natija").innerHTML = "❌ Xato! Yana urinib ko‘ring";
          document.getElementById("urinish").innerHTML = "Urinishlar: " + count;
        }
      }
    </script>

  </body>
</html>
