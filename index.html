<!DOCTYPE html>
<html>
<head>
  <title>Sonni top o‘yini</title>

  <style>
    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      font-family: Arial;
      text-align: center;
    }

    .card {
      background: white;
      width: 300px;
      margin: 100px auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    button {
      background-color: #4facfe;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    .fade {
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>🎮 Sonni top</h2>
    <p>1 dan 10 gacha sonni toping</p>

    <input type="number" id="taxmin" placeholder="Son kiriting">
    <br><br>

    <button onclick="tekshir()">Tekshir 🔍</button>

    <p id="natija"></p>
    <p id="urinish"></p>
    <p id="score"></p>
  </div>

  <script>
    var togriSon = Math.floor(Math.random() * 10) + 1;
    var count = 0;
    var score = 0;

    function tekshir() {
      var userSon = document.getElementById("taxmin").value;
      var natijaEl = document.getElementById("natija");

      if (count >= 3) {
        natijaEl.innerHTML = "💀 GAME OVER!";
        count = 0;
        togriSon = Math.floor(Math.random() * 10) + 1;
        return;
      }

      count++;

      if (userSon == togriSon) {
        score++;
        natijaEl.innerHTML = "🎉 To‘g‘ri topdingiz!";
        document.getElementById("score").innerHTML = "Score: " + score;

        count = 0;
        togriSon = Math.floor(Math.random() * 10) + 1;
      } 
      else if (userSon < togriSon) {
        natijaEl.innerHTML = "⬆️ Kattaroq son kiriting";
      } 
      else {
        natijaEl.innerHTML = "⬇️ Kichikroq son kiriting";
      }

      document.getElementById("urinish").innerHTML = "Urinishlar: " + count;

      natijaEl.classList.remove("fade");
      void natijaEl.offsetWidth;
      natijaEl.classList.add("fade");
    }
  </script>

</body>
</html>
