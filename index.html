      border: none;
      padding: 10px 20px;
      border-radius: 8px;

    }

    button:hover {

    .fade {
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
