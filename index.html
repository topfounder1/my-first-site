<!DOCTYPE html>
<html>
<head>
  <title>Ultra Pro Game</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      font-family: Arial;
      text-align: center;
    }

    .card {
      background: white;
      width: 320px;
      margin: 80px auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .win { background-color: #b2ffb2 !important; }
    .lose { background-color: #ffb2b2 !important; }

    button {
      background-color: #4facfe;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }

    #countdown {
      font-size: 40px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card" id="card">

    <h2>🎮 Ultra Game</h2>

    <!-- START -->
    <div id="startScreen">
      <p>🤔 Tayyormisiz?</p>
      <button onclick="startCountdown()">Boshlash ▶️</button>
    </div>

    <!-- COUNTDOWN -->
    <div id="countdownScreen" style="display:none;">
      <p id="countdown">3</p>
    </div>

    <!-- GAME -->
    <div id="gameScreen" style="display:none;">
      <p id="timer">⏱ Vaqt: 20</p>

      <input type="number" id="taxmin" placeholder="Son kiriting">
      <br><br>

      <button onclick="tekshir()">Tekshir</button>

      <p id="natija"></p>
      <p id="score"></p>

      <!-- 🔄 Qayta urinish -->
      <button id="retryBtn" onclick="restartGame()" style="display:none;">
        🔄 Qayta urinish
      </button>
    </div>

  </div>

  <script>
    var togriSon;
    var score = 0;
    var vaqt = 20;
    var timer;

    var bestScore = localStorage.getItem("bestScore") || 0;

    function startCountdown() {
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("countdownScreen").style.display = "block";

      var count = 3;
      var el = document.getElementById("countdown");

      var interval = setInterval(function() {
        el.innerHTML = count;
        count--;

        if (count < 0) {
          clearInterval(interval);
          el.innerHTML = "GO! 🚀";

          setTimeout(function() {
            document.getElementById("countdownScreen").style.display = "none";
            startGame();
          }, 1000);
        }
      }, 1000);
    }

    function startGame() {
      document.getElementById("gameScreen").style.display = "block";
      document.getElementById("retryBtn").style.display = "none";

      score = 0;
      document.getElementById("score").innerHTML = "Score: 0 | Best: " + bestScore;

      yangiOyin();
    }

    function yangiOyin() {
      togriSon = Math.floor(Math.random() * 10) + 1;
      startTimer();
    }

    function startTimer() {
      clearInterval(timer);
      vaqt = 20;
      document.getElementById("timer").innerHTML = "⏱ Vaqt: " + vaqt;

      timer = setInterval(function() {
        vaqt--;
        document.getElementById("timer").innerHTML = "⏱ Vaqt: " + vaqt;

        if (vaqt <= 0) {
          clearInterval(timer);
          finishGame("💀 Vaqt tugadi!", "lose");
        }
      }, 1000);
    }

    function tekshir() {
      var userSon = document.getElementById("taxmin").value;
      var card = document.getElementById("card");

      card.classList.remove("win", "lose");

      if (userSon == togriSon) {
        score++;

        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem("bestScore", bestScore);
        }

        finishGame("🎉 To‘g‘ri!", "win");

      } else {
        document.getElementById("natija").innerHTML = "❌ Xato!";
        card.classList.add("lose");
        playLose();
      }
    }

    function finishGame(text, type) {
      clearInterval(timer);

      var card = document.getElementById("card");

      document.getElementById("natija").innerHTML = text;
      document.getElementById("score").innerHTML = "Score: " + score + " | Best: " + bestScore;

      card.classList.add(type);

      if (type === "win") playWin();
      else playLose();

      document.getElementById("retryBtn").style.display = "block";
    }

    function restartGame() {
      document.getElementById("retryBtn").style.display = "none";
      document.getElementById("natija").innerHTML = "";
      document.getElementById("taxmin").value = "";
      document.getElementById("card").classList.remove("win", "lose");

      yangiOyin();
    }

    function playWin() {
      var audio = new Audio("https://www.soundjay.com/button/sounds/button-3.mp3");
      audio.play();
    }

    function playLose() {
      var audio = new Audio("https://www.soundjay.com/button/sounds/button-10.mp3");
      audio.play();
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
